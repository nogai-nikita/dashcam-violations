# Serving backend + pipeline worker, both GPU-reserved.
#
# Default engine is vLLM, which runs the WHOLE VLM — including the vision
# encoder — on the GPU. (Ollama was tried first but runs Qwen3-VL's vision
# encoder on CPU on a 12 GB card: ~2 min/clip vs ~4 s/clip with vLLM. See
# SOLUTION.md §2. Ollama is kept as an opt-in alternative: `--profile ollama`.)
#
#   cp .env.example .env                        # set SD_MOUNT, DATA_DIR
#   docker compose up -d vllm                   # first boot downloads weights + JITs kernels (~2 min)
#   docker compose run --rm worker run          # ingest + detect + review
#   docker compose run --rm worker list         # show the pending-review queue

services:
  vllm:
    image: vllm/vllm-openai:cu129-nightly        # cu129 = Blackwell/sm_120 support
    container_name: dv-vllm
    ipc: host                                    # vLLM needs ample shared memory
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
    # AWQ 4-bit of the 8B (~7.6 GB) is the largest Qwen3-VL that fits 12 GB with
    # room for KV + GPU vision. The 8B-FP8 (10.6 GB) OOMs; swap to
    # Qwen/Qwen3-VL-4B-Instruct-FP8 if you want more headroom.
    command:
      - --model
      - cyankiwi/Qwen3-VL-8B-Instruct-AWQ-4bit
      - --served-model-name
      - qwen3-vl
      - --max-model-len
      - "8192"
      - --gpu-memory-utilization
      - "${VLLM_GPU_UTIL:-0.80}"                  # 0.80 coexists with a desktop; raise toward 0.92 if headless
      - --max-num-seqs
      - "1"
      - --limit-mm-per-prompt
      - '{"image": 8}'
      - --mm-processor-kwargs
      - '{"max_pixels": 786432}'                  # caps Qwen3-VL dynamic-resolution vision tokens (~750/frame)
      - --enforce-eager                           # skip CUDA-graph capture to save VRAM
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 60
      start_period: 40s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # Optional alternative backend. Start with: docker compose --profile ollama up -d ollama
  # NOTE: serves Qwen3-VL's vision encoder on CPU on 12 GB — slow. See SOLUTION.md §2.
  ollama:
    image: ollama/ollama:latest
    container_name: dv-ollama
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    environment:
      OLLAMA_CONTEXT_LENGTH: "8192"
      OLLAMA_KEEP_ALIVE: "30m"
    volumes:
      - ollama_models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  worker:
    build: ./worker
    container_name: dv-worker
    # Run as the host user so ingested clips/manifests in DATA_DIR are owned by
    # you (not root) and stay easy to review, back up, and delete.
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    depends_on:
      vllm:
        condition: service_healthy
    environment:
      SD_MOUNT: /sd
      DATA_DIR: /data
      VLM_BASE_URL: http://vllm:8000
      VLM_MODEL: qwen3-vl
    volumes:
      - ${SD_MOUNT:?set SD_MOUNT in .env}:/sd:ro   # SD card mounted READ-ONLY
      - ${DATA_DIR:?set DATA_DIR in .env}:/data     # working area, read-write
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]                   # for the YOLO gate

volumes:
  ollama_models:
  hf_cache:
    name: dashcam_hf_cache                          # reuse the pre-downloaded weights
