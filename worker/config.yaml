# Dashcam violation pipeline — configuration.
# This file is the main accuracy lever. Edit rule wording, thresholds, and the
# YOLO trigger set; re-run `pipeline.py review` to re-evaluate (it is idempotent).

# ---------------------------------------------------------------------------
# Paths. Defaults assume the Docker layout; the env vars (SD_MOUNT / DATA_DIR)
# set in .env override these. Native runs can also pass --sd / --data on the CLI.
# ---------------------------------------------------------------------------
paths:
  sd_mount: /sd        # read-only source (the dumped SD card)
  data_dir: /data      # read-write working area (clips/, ingested_hashes.txt)

# ---------------------------------------------------------------------------
# Ingest. Dashcams reuse filenames, so dedup is by content hash, never by name.
# ---------------------------------------------------------------------------
ingest:
  video_extensions: [".mp4", ".mov", ".avi", ".mkv", ".ts"]
  hash_algorithm: sha1          # ledger keys; sha1 is plenty for dedup
  clip_id_length: 12            # first N hex chars of the hash -> clip_id / folder
  set_readonly: true            # chmod the copied original to 0444 (evidence integrity)

# ---------------------------------------------------------------------------
# Time & location. The dashcam clock runs on Korea time (UTC+9 — never reset
# after import); the embedded GPS gives true UTC. captured_date is the
# LOCAL date where the car is (Bishkek, UTC+6), taken from GPS when available,
# else from the filename (KST) shifted by (local - dashcam_clock).
# ---------------------------------------------------------------------------
gps:
  enabled: true
  subtitle_stream: 0            # NMEA $GPRMC lives in subtitle stream 0 on the TR10
time:
  local_utc_offset_hours: 6            # Bishkek (UTC+6, no DST) — where the car is
  dashcam_clock_utc_offset_hours: 9    # the TR10's filename/overlay clock (KST, UTC+9)

# ---------------------------------------------------------------------------
# Detect — the cheap YOLO gate. Most footage is empty road; the gate keeps the
# VLM bill to minutes/day. Set use_yolo_prefilter:false to send everything to
# the VLM during early testing (then torch/ultralytics aren't even imported).
# ---------------------------------------------------------------------------
detect:
  use_yolo_prefilter: true
  model: yolov8n.pt             # auto-downloaded by ultralytics on first use
  # CPU by default: vLLM saturates the 12 GB GPU (~9.6 GB) so a GPU YOLO gate has
  # almost no headroom and can OOM. yolov8n on CPU is cheap (~1 fps sampling).
  # Set to "0" for GPU only if you lower VLLM_GPU_UTIL to free room (or run the
  # gate in a separate pass while vLLM is down).
  device: "cpu"                 # "cpu" | "0" (gpu) | "" (auto)
  sample_fps: 1.0               # frames per second of video to sample for the gate
  imgsz: 640
  conf: 0.35                    # YOLO detection confidence floor
  min_hits: 4                   # >= this many trigger detections -> candidate
  # COCO class names that count as "traffic activity worth a VLM look".
  trigger_classes:
    - car
    - truck
    - bus
    - motorcycle
    - bicycle
    - person
    - traffic light
    - stop sign

# ---------------------------------------------------------------------------
# Review — the VLM judgment. Any OpenAI-compatible endpoint works; the default
# stack serves Qwen3-VL on the GPU via vLLM (see docker-compose.yml). Override
# base_url/model with VLM_BASE_URL / VLM_MODEL env vars (compose sets these).
# ---------------------------------------------------------------------------
vlm:
  base_url: http://vllm:8000      # native run: override to http://localhost:8000
  model: qwen3-vl                 # vLLM --served-model-name (Ollama path: qwen3-vl:8b)
  frames_per_window: 8            # frames sampled across the clip and sent to the VLM.
                                  # vLLM on GPU makes frames cheap (~0.2s/call), so we
                                  # sample more for temporal coverage. Keep
                                  # frames * ~750 vision tokens + prompt < max-model-len.
  jpeg_quality: 85
  max_frame_width: 1280           # downscale wide frames before base64 (VRAM/bandwidth)
  min_confidence: 0.55            # keep only violations at/above this -> pending_review
  timeout_seconds: 300
  temperature: 0.1

# ---------------------------------------------------------------------------
# Rules — injected into the VLM prompt. The model reviews OTHER road users, not
# the camera car. rule_id values are what the model must echo back in its JSON.
# ---------------------------------------------------------------------------
rules:
  - id: red_light
    text: A vehicle is MOVING THROUGH the intersection / across the stop line
          while the traffic signal FACING ITS OWN direction of travel is red. A
          vehicle stopped or queued at a red (including one ahead of the ego car
          while both are stopped) is complying — not a violation. Do not report
          cross-traffic moving across the camera's view (it has its own green),
          and do not report unless the signal governing that vehicle is visibly
          red.
  - id: stop_sign
    text: At an intersection with a STOP sign and NO traffic light, a vehicle
          clearly proceeds without stopping. If a traffic light controls the
          intersection, the light governs — do not report a stop-sign violation
          there. Do not infer a rolling stop from still frames.
  - id: wrong_way
    text: A vehicle travels against the legal direction of traffic (wrong way on
          a one-way street or in an oncoming lane).
  - id: illegal_overtake
    text: A vehicle overtakes across a solid centre line or in a no-passing zone.
  - id: no_signal_lane_change
    text: A vehicle visibly changes lanes or turns without signalling (only if a
          lit indicator would be clearly visible from this angle).
  - id: phone_use
    text: The DRIVER of another vehicle is visibly holding/using a phone while at
          the wheel. Never report pedestrians or passengers.
  - id: failure_to_yield
    text: A vehicle fails to yield to a pedestrian already in a crosswalk, or
          fails to yield where it is clearly required to and another road user
          has the right of way.
